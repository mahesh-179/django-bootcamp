{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tea House{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<!-- Navbar -->
<header style="background:linear-gradient(90deg,#4e342e,#3e2723); padding:18px 60px; box-shadow:0 3px 10px rgba(0,0,0,0.2);">
    <nav style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color:#ffcc80; font-size:24px; font-weight:600; letter-spacing:1px;">MaheshChai Wala</h2>
        <ul style="list-style:none; display:flex; gap:35px;">
            <li><a href="/" style="text-decoration:none; color:white; font-size:16px; position:relative; transition:0.3s;">Home</a></li>
            <li><a href="{% url 'menu' %}" style="text-decoration:none; color:white; font-size:16px; position:relative; transition:0.3s;">Menu</a></li>
            <li><a href="{% url 'about' %}" style="text-decoration:none; color:white; font-size:16px; position:relative; transition:0.3s;">About</a></li>
            <li><a href="{% url 'store' %}" style="text-decoration:none; color:white; font-size:16px; position:relative; transition:0.3s;">Contact</a></li>
        </ul>
    </nav>
</header>

<!-- Main Content -->
<main>
    {% block content %}
    {% endblock %}
</main>

<!-- Footer -->
<footer style="background:#3e2723; color:white; text-align:center; padding:25px; margin-top:50px;">
    <p>© 2026 MaheshChai Wala Cafe</p>
</footer>

</body>
</html>
