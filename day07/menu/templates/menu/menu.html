{% extends "layout.html" %}

{% block title %}Menu - Tea House{% endblock %}

{% block content %}
<section style="text-align: center; padding: 60px 10%;">
    <h1 style="font-size: 45px; margin-bottom: 40px; color: #4e342e;">Our Tea Menu</h1>

    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 30px;">
        {% for item in items %}
        <div style="
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            width: 250px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            margin-bottom: 20px;
        ">
            
            {% if item.image %}
            <img src="{{ item.image.url }}" alt="{{ item.name }}" style="
                width: 100%;
                height: 180px;
                object-fit: cover;
                border-radius: 12px;
                margin-bottom: 15px;
            ">
            {% endif %}

            <h3 style="margin-bottom: 12px; font-size: 20px; color:#3e2723;">{{ item.name }}</h3>
            <p style="color:#bf360c; font-weight:600; font-size:18px;">Rs {{ item.price }}</p>

            <a href="{% url 'order_confirmation' item.id %}" style="text-decoration:none;">
                <button style="
                    background-color: #6b4226; /* brown chai color */
                    color: white; 
                    padding: 10px 20px; 
                    border: none; 
                    border-radius: 8px; 
                    cursor: pointer;
                    font-size: 16px;
                    transition: 0.3s;
                " 
                onmouseover="this.style.backgroundColor='#a9745b'; this.style.transform='scale(1.05)';" 
                onmouseout="this.style.backgroundColor='#6b4226'; this.style.transform='scale(1)';">
                    Purchase
                </button>
            </a>

        </div>
        {% empty %}
        <p>No menu items available.</p>
        {% endfor %}
    </div>
</section>

<!-- Inline Responsive & Hover -->
<style>
    @media screen and (max-width: 600px) {
        section div[style*="width: 250px"] {
            width: 90% !important;
        }
    }

    section div[style*="transition: 0.3s"]:hover {
        transform: translateY(-8px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
</style>
{% endblock %}
