{% extends "layout.html" %}

{% block title %}Menu - Tea House{% endblock %}

{% block content %}
<section style="text-align: center; padding: 60px 10%;">
    <h1 style="font-size: 45px; margin-bottom: 40px; color: #4e342e;">Our Tea Menu</h1>

    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 30px;">
        {% for item in items %}
        <div style="background: white; padding: 20px; border-radius: 12px; text-align: center; width: 250px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s; margin-bottom: 20px;">
            
            {% if item.image %}
            <img src="{{ item.image.url }}" alt="{{ item.name }}" style="width: 100%; height: 180px; object-fit: cover; border-radius: 12px; margin-bottom: 15px;">
            {% endif %}

            <h3 style="margin-bottom: 12px; font-size: 20px; color:#3e2723;">{{ item.name }}</h3>
            <p style="color:#bf360c; font-weight:600; font-size:18px;">Rs {{ item.price }}</p>
        </div>
        {% empty %}
        <p>No menu items available.</p>
        {% endfor %}
    </div>
</section>

<!-- Inline Responsive & Hover -->
<style>
    @media screen and (max-width: 600px) {
        section div[style*="width: 250px"] {
            width: 90% !important;
        }
    }

    section div[style*="transition: 0.3s"]:hover {
        transform: translateY(-8px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
</style>
{% endblock %}
