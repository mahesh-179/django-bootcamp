{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Order is on the Way!</title>
</head>
<body style="
    margin:0;
    padding:0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #fff5e6, #ffe0b2);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
">

<div style="
    background:#fff8f0;
    padding:40px 30px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    text-align:center;
    max-width:500px;
    width:90%;
    animation: pop 0.5s ease-out;
">

    <h1 style="
        color:#6b4226;
        font-size:40px;
        margin-bottom:20px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    ">🚴‍♂️ Your Order is on the Way!</h1>

    <p style="
        font-size:18px;
        color:#7a4b2b;
        margin-bottom:25px;
    ">Sit back and relax, your tea is being delivered.</p>

    <!-- Order Details -->
    <div style="
        background:#fdf0e0;
        padding:20px;
        border-radius:15px;
        box-shadow:0 5px 15px rgba(0,0,0,0.1);
        margin-bottom:20px;
    ">
        <h2 style="
            font-size:28px;
            color:#a0522d;
            margin-bottom:10px;
        ">{{ chai.name }}</h2>
        <p style="
            font-size:20px;
            color:#6b4226;
            margin:0;
        ">Price: Rs {{ chai.price }}</p>
    </div>

</div>

<!-- Animation -->
<script>
    const style = document.createElement('style');
    style.innerHTML = `
        @keyframes pop {
            0% { transform: scale(0.5); opacity:0; }
            100% { transform: scale(1); opacity:1; }
        }
    `;
    document.head.appendChild(style);
</script>

</body>
</html>
