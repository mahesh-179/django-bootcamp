{% extends "layout.html" %}
{% load static %}

{% block title %}Update Tweet{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm rounded">
            <div class="card-body">
                <h4 class="card-title mb-4 text-center text-primary">Update Current Tweet</h4>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        {{ form.text.label_tag }}
                        {{ form.text }}
                    </div>
                    
                    <div class="mb-3">
                        {{ form.photo.label_tag }}
                        {{ form.photo }}
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">Update Tweet</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
