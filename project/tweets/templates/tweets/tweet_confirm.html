{% extends "layout.html" %}
{% block title %} TWEETS HOME PAGE {% endblock %}
{% block content %}
    <!-- Optional styling -->
   <style>
    .delete-container {
        text-align: center;
        margin-top: 100px;
    }

    .box {
        background: white;
        padding: 30px;
        border-radius: 10px;
        display: inline-block;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .btn {
        padding: 10px 20px;
        margin: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .btn-delete {
        background-color: red;
        color: white;
    }

    .btn-cancel {
        background-color: gray;
        color: white;
        text-decoration: none;
    }
</style>
</head>
<body>

<div class="box">
    <h2>Are you sure?</h2>

    <!-- You will replace variable -->
      <div class="card">
                {% if tweet.photo %}
                    <img src="{{ tweet.photo.url }}" class="card-img-top" alt="Tweet image" style="width: 100%; height: 200px; object-fit: cover;">
                {% endif %}
    <p>Do you really want to delete <strong>{{ tweet.text }}</strong>?</p>

    <form method="POST">
        {% csrf_token %}

        <button type="submit" class="btn btn-delete">Yes, Delete</button>

        <!-- Change URL yourself -->
        <a href="{% url 'tweet_list' %}" class="btn btn-cancel">Cancel</a>
    </form>
</div>

</body>
</html>
{% endblock %}
